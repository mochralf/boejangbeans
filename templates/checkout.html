<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout - Boejang Beans</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background-color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .cart {
        background: black;
        padding: 40px;
        padding: 1.4rem 7%;
        background-color: rgba(1, 1, 1, 0.6);
        border-radius: 8px;
        max-width: 400px;
        width: 100%;
        text-align: center;
        border: 1px solid #b6895b;
      }

      .cart h2 {
        margin-bottom: 20px;
        font-size: 24px;
        color: white;
      }

      .cart h2 span {
        color: #b6895b;
      }

      .cart h3 {
        margin-bottom: 5px;
        font-size: 15px;
        color: white;
      }

      .cart h4 {
        margin-top: 30px;
        margin-bottom: 5px;
        font-size: 15px;
        color: white;
      }

      .input-group {
        margin-bottom: 15px;
        position: relative;
      }

      .input-group input {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
      }

      .button {
        background: #b6895b;
        color: white;
        border: none;
        padding: 10px 90px;
        border-radius: 6px;
        cursor: pointer;
      }

      .error {
        color: red;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <section id="cart" class="cart">
      <h2><span>Check</span> Out</h2>
      <form action="/cart" method="POST">
        <h3>Nama dan Alamat</h3>
        <div class="input-group">
          <input
            type="text"
            name="name"
            placeholder="Masukkan Nama Depan Anda"
            required
          />
        </div>
        <div class="input-group">
          <input
            type="text"
            name="name2"
            placeholder="Masukkan Nama Belakang Anda"
            required
          />
        </div>
        <div class="input-group">
          <input
            type="text"
            name="alamat"
            placeholder="Masukkan Alamat Anda"
            required
          />
        </div>
        <h4>Kontak</h4>
        <div class="input-group">
          <input
            type="email"
            name="email"
            placeholder="Masukkan Email Anda"
            required
          />
        </div>
        <div class="input-group">
          <input
            type="text"
            name="no_hp"
            placeholder="Masukkan No HP Anda"
            required
          />
        </div>

        <button type="submit" class="button">Send</button>
      </form>
    </section>

    <!-- Feather Icons -->
    <script src="https://unpkg.com/feather-icons"></script>
    <script>
      feather.replace();
    </script>
  </body>
</html>
